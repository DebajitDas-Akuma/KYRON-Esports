<style>

body{
font-family:'Rajdhani',sans-serif;
background:#0a0e27;
color:white;
padding:120px 20px 20px 20px;
}


.section{
display:none;
margin-top:20px;
}

h2{
font-size:1.8rem;
margin-top:30px;
margin-bottom:10px;
font-weight:600;
}

h3{
font-size:1.3rem;
margin-top:20px;
margin-bottom:10px;
}

/* Buttons */

button{
padding:10px 18px;
margin:8px 8px 12px 0;
border-radius:8px;
background:linear-gradient(135deg,#06b6d4,#2563eb);
color:white;
font-size:16px;
font-weight:600;
border:none;
cursor:pointer;
transition:all 0.25s ease;
box-shadow:0 0 10px rgba(34,211,238,0.3);
display:inline-block;
}
button:hover{
transform:translateY(-2px);
box-shadow:0 0 18px rgba(34,211,238,0.6);
}

/* Inputs */

input,select{
padding:11px 12px;
margin:8px 12px 12px 0;
border-radius:8px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
color:white;
font-size:0.95rem;
outline:none;
transition:all 0.25s ease;
}

input:focus,select:focus{
border-color:#22d3ee;
box-shadow:0 0 8px rgba(34,211,238,0.4);
}

#playerInputs div{
margin-bottom:12px;
}

/* Tables */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:rgba(255,255,255,0.03);
border-radius:10px;
overflow:hidden;
}

th{
background:rgba(255,255,255,0.08);
font-weight:600;
}

th,td{
border:1px solid rgba(255,255,255,0.08);
padding:10px;
text-align:center;
}

.active{
display:block;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #444;
padding:8px;
text-align:center;
}

.font-esports{
font-family:'Orbitron',sans-serif;
}

.nav-blur{
background:rgba(10,14,39,0.8);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* Fix normal buttons */

body > button{
padding:10px 18px;
margin:8px 10px 10px 0;
font-size:15px;
border-radius:8px;
background:linear-gradient(135deg,#06b6d4,#2563eb);
color:white;
font-weight:600;
border:none;
cursor:pointer;
display:inline-block;
}


/* Fix table buttons (Save buttons) */

table button{
padding:6px 12px;
font-size:20px;
margin: 20px;
}


/* Fix inputs inside tables */

table input{
width:120px;
padding:6px 8px;
font-size:14px;
}


/* Fix registration inputs */

#playerSection input{
width:200px;
}


/* Better spacing for player rows */

#playerInputs div{
display:flex;
gap:10px;
margin-bottom:10px;
align-items:center;
}
</style>
</head>

<body>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">

<div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
<div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
<span class="font-esports font-bold text-white text-lg">K</span>
</div>

<span class="font-esports font-bold text-xl tracking-wider text-white">
KYRON ESPORTS
</span>
</div>

<a href="index.html"
class="text-gray-300 hover:text-cyan-400 transition-colors font-medium">
Home
</a>

class="text-gray-300 hover:text-cyan-400 transition-colors font-medium">
Matches
</a>

</div>

<h1 class="font-esports text-3xl mb-6">KYRON Admin Panel</h1>

<button onclick="openGame('freefire')">Free Fire</button>
<button onclick="openGame('bgmi')">BGMI</button>
<button onclick="showCreateMatch()">Create Match</button>


<div id="matchSection" class="section">
<h2 id="gameTitle"></h2>
<div id="matchList"></div>
</div>

<div id="seasonSection" class="section">
<h2 id="seasonTitle"></h2>
<div id="seasonList"></div>
</div>


<div id="playerSection" class="section">

<h2 id="matchTitle"></h2>

<h3>Player Registration</h3>

<input id="teamName" placeholder="Team Name">

<div id="playerInputs">

<div>
<input id="playerName1" placeholder="Player 1 IGN">
<input id="playerUID1" placeholder="Player 1 UID">
<label><input type="checkbox" id="leader1"> Leader</label>
</div>

<div id="p2">
<input id="playerName2" placeholder="Player 2 IGN">
<input id="playerUID2" placeholder="Player 2 UID">
<label><input type="checkbox" id="leader2"> Leader</label>
</div>

<div id="p3">
<input id="playerName3" placeholder="Player 3 IGN">
<input id="playerUID3" placeholder="Player 3 UID">
<label><input type="checkbox" id="leader3"> Leader</label>
</div>

<div id="p4">
<input id="playerName4" placeholder="Player 4 IGN">
<input id="playerUID4" placeholder="Player 4 UID">
<label><input type="checkbox" id="leader4"> Leader</label>
</div>

</div>

<button onclick="registerPlayer()">Register Team</button>


<h3>Registered Players</h3>

<table id="playerTable"></table>


<h3>Leaderboard</h3>

<table id="leaderboardTable"></table>

<h3>Season Leaderboard</h3>
<table id="seasonLeaderboard"></table>
</div>


<div id="createMatchSection" class="section">

<h2>Create Match</h2>

<select id="gameSelect">
<option value="freefire">Free Fire</option>
<option value="bgmi">BGMI</option>
</select><br>

<input id="seasonName" placeholder="Season Name"><br>

<input id="matchName" placeholder="Match Name"><br>

<select id="matchType">
<option value="BR">BR</option>
<option value="CS">CS</option>
<option value="TDM">TDM</option>
</select><br>

<select id="teamType">
<option value="Solo">Solo</option>
<option value="Duo">Duo</option>
<option value="Squad">Squad</option>
</select><br>

<input id="matchDate" type="datetime-local"><br>

<input id="formLink" placeholder="Google Form Link"><br>

<button onclick="createMatch()">Create Match</button>

</div>


<script type="module">
    
import { auth, db, onAuthStateChanged, doc, getDoc, signOut, collection, addDoc, setDoc, getDocs } from "./firebase.js";

// Protect admin page
onAuthStateChanged(auth, async (user) => {
    if (user) {
        // Check if UID exists in admins collection
        const adminDoc = await getDoc(doc(db, "admins", user.uid));
        if (!adminDoc.exists()) {
            alert("Access Denied! You are not an admin.");
            window.location.href = "adminGateWay.html";
        }
        // else: user is authorized, continue loading page
    } else {
        // Not logged in
        window.location.href = "adminGateWay.html";
    }
});



window.logoutAdmin = async function() {
    await signOut(auth);
    window.location.href = "adminGateWay.html";
}

/* LOCAL DATA */

let games={
freefire:[],
bgmi:[]
};

let players=[
{name:"Player1",uid:"111"},
{name:"Player2",uid:"222"},
{name:"Player3",uid:"333"}
];

let currentGame="";
let currentMatch="";
let currentSeason=""
let currentMatchID=""
let currentTeamType = ""
let registeredPlayers=[]

window.hideAll=function(){

document.getElementById("matchSection").classList.remove("active");
document.getElementById("playerSection").classList.remove("active");
document.getElementById("createMatchSection").classList.remove("active");

}


/* OPEN GAME */

window.openGame=async function(game){

hideAll();

currentGame=game;

document.getElementById("matchSection").classList.add("active");

document.getElementById("gameTitle").innerText=game.toUpperCase()+" Matches";

let list=document.getElementById("matchList");

list.innerHTML="";

games[game]=[];

const seasons=await getDocs(collection(db,"games",game,"seasons"));

for(const seasonDoc of seasons.docs){

const matches=await getDocs(collection(db,"games",game,"seasons",seasonDoc.id,"matches"));

matches.forEach(m=>{

games[game].push({
name:m.data().name,
id:m.id,
season:seasonDoc.id
});

});

}

games[game].forEach(match=>{

list.innerHTML+=`<button onclick="openMatch('${match.name}')">${match.name}</button>`;

});

}


/* OPEN MATCH */

window.openMatch=function(matchID,name,teamType){

hideAll()

currentMatchID=matchID
currentTeamType = teamType

document.getElementById("playerSection").classList.add("active")

document.getElementById("matchTitle").innerText=currentSeason+" - "+name

/* reset inputs visibility */

document.getElementById("p2").style.display="none"
document.getElementById("p3").style.display="none"
document.getElementById("p4").style.display="none"

/* solo */

if(teamType==="Solo"){
document.getElementById("teamName").style.display="none"
}

/* duo */

if(teamType==="Duo"){
document.getElementById("teamName").style.display="inline-block"
document.getElementById("p2").style.display="block"
}

/* squad */

if(teamType==="Squad"){
document.getElementById("teamName").style.display="inline-block"
document.getElementById("p2").style.display="block"
document.getElementById("p3").style.display="block"
document.getElementById("p4").style.display="block"
}

loadPlayers()

}


/* RENDER PLAYERS */

window.renderPlayers=function(){
let table=document.getElementById("playerTable")

table.innerHTML=`
<tr>
<th>Team</th>
<th>IGN</th>
<th>UID</th>
<th>Kills</th>
<th>Placement</th>
<th>Save</th>
</tr>
`

registeredPlayers.forEach((p,i)=>{

table.innerHTML+=`
<tr>
<td>${p.team || "Solo"}</td>
<td>${p.name}</td>
<td>${p.uid}</td>
<td><input id="kills${i}" type="number" value="${p.kills}"></td>
<td><input id="place${i}" type="number" value="${p.placement}"></td>
<td><button onclick="save(${i})">Save</button></td>
</tr>
`
})
}


/* SAVE PLAYER RESULT */

window.save=async function(i){

let kills = Number(document.getElementById("kills"+i).value)
let place = Number(document.getElementById("place"+i).value)

let player = registeredPlayers[i]

let totalPlayers = registeredPlayers.length

let points = totalPlayers - (place - 1) + kills


/* SAVE MATCH RESULT */

await setDoc(
doc(
db,
"games",
currentGame,
"seasons",
currentSeason,
"matches",
currentMatchID,
"players",
player.id
),
{
name:player.name,
uid:player.uid,
team:player.team || "Solo",
kills:kills,
placement:place,
points:points
}
)


/* UPDATE SEASON LEADERBOARD */

await updateSeasonLeaderboard(player.name,player.uid,points)

alert("Performance saved")

loadPlayers()

}


/* SHOW CREATE MATCH */

window.showCreateMatch=function(){

hideAll();

document.getElementById("createMatchSection").classList.add("active");

}


/* CREATE MATCH */

window.createMatch=async function(){

let game=document.getElementById("gameSelect").value;

let season=document.getElementById("seasonName").value;

let name=document.getElementById("matchName").value;

let type=document.getElementById("matchType").value;

let team=document.getElementById("teamType").value;

let date=document.getElementById("matchDate").value;

let form=document.getElementById("formLink").value;

let matchData={
name:name,
type:type,
team:team,
date:date,
form:form
};

await setDoc(
doc(db,"games",game,"seasons",season),
{season:season},
{merge:true}
);

await addDoc(
collection(db,"games",game,"seasons",season,"matches"),
matchData
);

alert("Match Created Successfully");

}


window.openGame=async function(game){

hideAll()

currentGame=game

document.getElementById("seasonSection").classList.add("active")

document.getElementById("seasonTitle").innerText=game.toUpperCase()+" Seasons"

let list=document.getElementById("seasonList")

list.innerHTML=""

const seasons=await getDocs(collection(db,"games",game,"seasons"))

seasons.forEach(doc=>{

list.innerHTML+=`
<button onclick="openSeason('${doc.id}')">${doc.id}</button>
`

})

}

window.openSeason=async function(season){

hideAll()

currentSeason=season

document.getElementById("matchSection").classList.add("active")

document.getElementById("gameTitle").innerText="Season: "+season

let list=document.getElementById("matchList")

list.innerHTML=""

const matches=await getDocs(
collection(db,"games",currentGame,"seasons",season,"matches")
)

matches.forEach(doc=>{

let m=doc.data()

list.innerHTML+=`
<button onclick="openMatch('${doc.id}','${m.name}','${m.team}')">
${m.name} (${m.team})
</button>
`

})
}

window.registerPlayer=async function(){

let team=document.getElementById("teamName").value || "Solo"

let players=[]

players.push({
name:document.getElementById("playerName1").value,
uid:document.getElementById("playerUID1").value,
leader:document.getElementById("leader1").checked
})

if(currentTeamType==="Duo" || currentTeamType==="Squad"){

players.push({
name:document.getElementById("playerName2").value,
uid:document.getElementById("playerUID2").value,
leader:document.getElementById("leader2").checked
})

}

if(currentTeamType==="Squad"){

players.push({
name:document.getElementById("playerName3").value,
uid:document.getElementById("playerUID3").value,
leader:document.getElementById("leader3").checked
})

players.push({
name:document.getElementById("playerName4").value,
uid:document.getElementById("playerUID4").value,
leader:document.getElementById("leader4").checked
})

}

/* ensure only one leader */

let leaderCount = players.filter(p=>p.leader).length

if(currentTeamType!=="Solo" && leaderCount!==1){

alert("Select exactly ONE team leader")
return

}

/* save players */

for(let p of players){

await addDoc(
collection(
db,
"games",
currentGame,
"seasons",
currentSeason,
"matches",
currentMatchID,
"players"
),
{
name:p.name,
uid:p.uid,
team:team,
leader:p.leader,
kills:0,
placement:0
}
)

}

alert("Team Registered")

loadPlayers()

}

async function loadPlayers(){

registeredPlayers=[]

const snap=await getDocs(
collection(
db,
"games",
currentGame,
"seasons",
currentSeason,
"matches",
currentMatchID,
"players"
)
)

snap.forEach(doc=>{
registeredPlayers.push({
id:doc.id,
...doc.data()
})
})

renderPlayers()
renderLeaderboard()

}


function renderLeaderboard(){

let board=document.getElementById("leaderboardTable")

board.innerHTML=`
<tr>
<th>IGN</th>
<th>UID</th>
<th>Kills</th>
<th>Placement</th>
<th>Points</th>
</tr>
`

let totalPlayers = registeredPlayers.length

let sorted=[...registeredPlayers]

sorted.sort((a,b)=>{

let pa = totalPlayers - (a.placement - 1) + a.kills
let pb = totalPlayers - (b.placement - 1) + b.kills

return pb - pa

})

sorted.forEach(p=>{

let points = totalPlayers - (p.placement - 1) + p.kills

board.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.uid}</td>
<td>${p.kills}</td>
<td>${p.placement}</td>
<td>${points}</td>
</tr>
`

})

}


async function updateSeasonLeaderboard(name,uid,points){

let ref = doc(
db,
"games",
currentGame,
"seasons",
currentSeason,
"leaderboard",
uid
)

const snap = await getDocs(
collection(
db,
"games",
currentGame,
"seasons",
currentSeason,
"leaderboard"
)
)

let existing = null

snap.forEach(d=>{
if(d.id===uid) existing=d.data()
})

if(existing){

let matchesPlayed = existing.matchesPlayed + 1
let totalPoints = existing.totalPoints + points
let avgPoints = totalPoints / matchesPlayed

await setDoc(ref,{
name:name,
uid:uid,
matchesPlayed:matchesPlayed,
totalPoints:totalPoints,
avgPoints:avgPoints
})

}
else{

await setDoc(ref,{
name:name,
uid:uid,
matchesPlayed:1,
totalPoints:points,
avgPoints:points
})

}

}


async function renderSeasonLeaderboard(){

let board=document.getElementById("seasonLeaderboard")

board.innerHTML=`
<tr>
<th>IGN</th>
<th>UID</th>
<th>Matches</th>
<th>Total Points</th>
<th>Average Points</th>
</tr>
`

const snap = await getDocs(
collection(
db,
"games",
currentGame,
"seasons",
currentSeason,
"leaderboard"
)
)

let players=[]

snap.forEach(doc=>{
players.push(doc.data())
})

players.sort((a,b)=>b.avgPoints-a.avgPoints)

players.forEach(p=>{

board.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.uid}</td>
<td>${p.matchesPlayed}</td>
<td>${p.totalPoints}</td>
<td>${p.avgPoints.toFixed(2)}</td>
</tr>
`

})

}
</script>
