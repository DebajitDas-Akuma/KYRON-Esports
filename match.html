<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kyron Esports | Match Results</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

.nav-blur{
background:rgba(10,14,39,0.8);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

:root{
--primary:#00d9ff;
--secondary:#8b5cf6;
--dark:#0a0e27;
--darker:#020617;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,var(--darker) 0%,var(--dark) 100%);
color:white;
min-height:100vh;
}

/* esports font */

.font-esports{
font-family:'Orbitron',sans-serif;
}

/* animated grid background */

.bg-grid{
background-image:
linear-gradient(rgba(0,217,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,217,255,0.03) 1px, transparent 1px);
background-size:50px 50px;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
0%{transform:translate(0,0)}
100%{transform:translate(50px,50px)}
}

/* glass card */

.glass-card{
background:rgba(255,255,255,0.03);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.05);
border-radius:16px;
}

/* leaderboard */

.leaderboard-table{
width:100%;
border-collapse:collapse;
}

.leaderboard-table th{
background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(0,217,255,0.2));
text-transform:uppercase;
letter-spacing:1px;
font-size:0.85rem;
}

.leaderboard-table td,
.leaderboard-table th{
padding:14px 18px;
}

.leaderboard-table tr:hover td{
background:rgba(255,255,255,0.05);
}

</style>

</head>


<body class="flex flex-col items-center p-6 pt-28">

<!-- Navigation -->
<nav class="nav-blur fixed w-full z-50 top-0">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- Logo -->
      <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
          <span class="font-esports font-bold text-white text-lg">K</span>
        </div>
        <span class="font-esports font-bold text-xl tracking-wider text-white">KYRON ESPORTS</span>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-6">
        <a href="index.html#games" class="text-gray-300 hover:text-cyan-400 transition-colors font-medium">
          Tournaments
        </a>

        <a href="index.html#highlights" class="text-gray-300 hover:text-cyan-400 transition-colors font-medium">
          Highlights
        </a>

        <button onclick="location.href='adminGateway.html'"
        class="px-4 py-2 rounded-lg border border-cyan-500/30 text-cyan-400 hover:bg-cyan-500/10 transition-all font-medium">
          Admin
        </button>
      </div>

    </div>
  </div>
</nav>

<div class="bg-grid"></div>


<!-- HEADER -->

<div class="text-center mb-10">

<h1 id="seasonTitle"
class="font-esports text-3xl md:text-4xl font-bold text-cyan-400 mb-2"></h1>

<h2 id="matchTitle"
class="text-xl text-gray-400"></h2>

</div>


<!-- RESULTS CARD -->

<div class="glass-card p-6 max-w-4xl w-full">

<table id="results" class="leaderboard-table">

<tr id="headerRow">

<th>Rank</th>
<th id="nameHeader">Player</th>
<th>Kills</th>
<th>Position</th>
<th>Points</th>

</tr>

</table>

</div>



<script type="module">

import { db, collection, getDocs, doc, getDoc } from "./firebase.js";

const params = new URLSearchParams(window.location.search);

const game = params.get("game");
const season = params.get("season");
const match = params.get("match");

const table = document.getElementById("results");


/* MATCH INFO */

const matchDoc = await getDoc(
doc(db,"games",game,"seasons",season,"matches",match)
);

let matchData = matchDoc.data() || {};

let teamType = matchData.team || "Solo";

if(teamType !== "Solo"){
document.getElementById("nameHeader").innerText="Team";
}

document.getElementById("seasonTitle").innerText =
game.toUpperCase()+" | "+season;

document.getElementById("matchTitle").innerText =
"Match: "+(matchData.name || match);



/* PLAYERS */

const snapshot = await getDocs(
collection(db,"games",game,"seasons",season,"matches",match,"players")
);

let players=[];

snapshot.forEach(d=>{
players.push(d.data());
});



/* SOLO MODE */

if(teamType==="Solo"){

const totalPlayers=players.length;

let results=[];

players.forEach(p=>{

let points = totalPlayers-(p.placement-1)+p.kills;

results.push({
name:p.name,
kills:p.kills,
placement:p.placement,
points:points
});

});


results.sort((a,b)=>{

if(b.points!==a.points){
return b.points-a.points;
}

return a.placement-b.placement;

});


results.forEach((p,index)=>{

let row=document.createElement("tr");

let rankColor =
index==0 ? "text-yellow-400 font-bold" :
index==1 ? "text-gray-300 font-bold" :
index==2 ? "text-orange-400 font-bold" :
"text-gray-400";

row.innerHTML=`
<td class="${rankColor}">#${index+1}</td>
<td class="font-semibold">${p.name}</td>
<td>${p.kills}</td>
<td>${p.placement}</td>
<td class="text-cyan-400 font-bold">${p.points}</td>
`;

table.appendChild(row);

});

}



/* TEAM MODE */

else{

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Team</th>
<th>Total Kills</th>
<th>Best Position</th>
<th>Points</th>
</tr>
`;

let teams={};

players.forEach(p=>{

if(!teams[p.team]){

teams[p.team]={
kills:0,
placement:999,
players:[]
};

}

teams[p.team].kills+=p.kills;

if(p.placement<teams[p.team].placement){
teams[p.team].placement=p.placement;
}

teams[p.team].players.push(p.name);

});


let teamResults=[];

let teamCount = Object.keys(teams).length;

for(let team in teams){

let t=teams[team];

let points = teamCount-(t.placement-1)+t.kills;

teamResults.push({
team:team,
kills:t.kills,
placement:t.placement,
points:points,
players:t.players.join(", ")
});

}



teamResults.sort((a,b)=>{

if(b.points!==a.points){
return b.points-a.points;
}

return a.placement-b.placement;

});



teamResults.forEach((t,index)=>{

let row=document.createElement("tr");

row.innerHTML=`
<td class="text-gray-400 font-bold">#${index+1}</td>
<td class="font-semibold">${t.team}<br>
<span class="text-xs text-gray-400">${t.players}</span></td>
<td>${t.kills}</td>
<td>${t.placement}</td>
<td class="text-cyan-400 font-bold">${t.points}</td>
`;

table.appendChild(row);

});

}

</script>

<!-- Footer -->
<footer class="mt-20 w-full border-t border-white/10 bg-black/40 backdrop-blur-xl">
  <div class="max-w-7xl mx-auto px-4 py-12">

    <div class="flex flex-col md:flex-row justify-between items-center gap-6">

      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center">
          <span class="font-esports font-bold text-white">K</span>
        </div>

        <span class="font-esports font-bold text-xl tracking-wider">
          KYRON ESPORTS
        </span>
      </div>

      <div class="flex gap-6">
        <a href="#" class="text-gray-400 hover:text-purple-400 transition-all">
          Instagram
        </a>

        <a href="#" class="text-gray-400 hover:text-green-400 transition-all">
          WhatsApp
        </a>

        <a href="#" class="text-gray-400 hover:text-red-400 transition-all">
          YouTube
        </a>
      </div>

    </div>

    <div class="mt-8 pt-8 border-t border-white/10 text-center text-gray-500 text-sm">
      <p>© 2026 Kyron Esports. All Rights Reserved.</p>
    </div>

  </div>
</footer>

</body>
</html>
