<!DOCTYPE html>
<html>
<body>

<h1>Leaderboard</h1>

<table border="1" id="leaderboard">
<tr>
<th>Rank</th>
<th>Team</th>
<th>Points</th>
<th>Matches</th>
</tr>
</table>

<script type="module">

import { db, collection, getDocs, query, orderBy } from "./firebase.js";

const q=query(collection(db,"leaderboard"),orderBy("totalPoints","desc"));

const snapshot=await getDocs(q);

let rank=1;

snapshot.forEach(d=>{

let t=d.data();

let row=document.createElement("tr");

row.innerHTML=`
<td>${rank}</td>
<td>${t.team}</td>
<td>${t.totalPoints}</td>
<td>${t.matchesPlayed}</td>
`;

document.getElementById("leaderboard").appendChild(row);

rank++;

});

</script>

</body>
</html>
